# .github/workflows/fuel-update.yml
# Runs the fuel data job every Monday morning and commits the fresh rates.
# Free on a public GitHub repo. Once this is turned on, it runs itself.
# If a source ever fails, the job still commits (using last-known values for
# the failed carrier) and GitHub emails you that the run had errors.

name: Weekly Fuel Surcharge Update

on:
  schedule:
    # 11:00 UTC every Monday = 7:00am ET (6:00am during standard time).
    # Carriers post Monday morning, so this picks up the new week.
    - cron: '0 11 * * 1'
  workflow_dispatch: {}   # lets you run it by hand any time from the Actions tab

permissions:
  contents: write          # allows the job to commit the updated JSON

jobs:
  update-rates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx cheerio fast-xml-parser

      - name: Fetch fuel data and rebuild rates
        env:
          # FedEx Rating API credentials (clean tracker account, list rates only).
          # Set these in Settings -> Secrets and variables -> Actions. If absent,
          # the job falls back to the band-table estimate for FedEx rows.
          FEDEX_CLIENT_ID: ${{ secrets.FEDEX_CLIENT_ID }}
          FEDEX_CLIENT_SECRET: ${{ secrets.FEDEX_CLIENT_SECRET }}
          FEDEX_ACCOUNT: ${{ secrets.FEDEX_ACCOUNT }}
          UPS_CLIENT_ID: ${{ secrets.UPS_CLIENT_ID }}
          UPS_CLIENT_SECRET: ${{ secrets.UPS_CLIENT_SECRET }}
          UPS_ACCOUNT: ${{ secrets.UPS_ACCOUNT }}
        run: node fetch-and-build.js

      - name: Commit the updated rates
        run: |
          git config user.name "fuel-bot"
          git config user.email "fuel-bot@users.noreply.github.com"
          git add fuel-rates.json
          git diff --staged --quiet || git commit -m "Fuel rates updated $(date -u +%Y-%m-%d)"
          git push

      # Runs AFTER the commit so the site always gets the best available data,
      # then fails the run (which makes GitHub email you) only when something
      # needs a human: a row fell back to last-known, or a manual override is
      # about to expire with no API replacing it. Quiet means healthy.
      - name: Alert on stale rows or expiring overrides
        run: |
          node -e "
          const j = require('./fuel-rates.json');
          const problems = [];
          const stale = j.carriers.filter(c => c.status !== 'ok').map(c => c.name);
          if (stale.length) problems.push('Rows on last-known values: ' + stale.join(', '));
          try {
            const { overrides = [] } = require('./overrides.json');
            const today = new Date().toISOString().slice(0, 10);
            const soon = new Date(Date.now() + 8 * 86400e3).toISOString().slice(0, 10);
            for (const o of overrides) {
              if (o.expires && o.expires > today && o.expires <= soon) {
                problems.push('Override expires ' + o.expires + ': ' + o.carrier + ' / ' + o.service + '. Wire the carrier API or refresh the verified rate before then.');
              }
            }
          } catch {}
          if (problems.length) { console.error(problems.join('\n')); process.exit(1); }
          console.log('All rows fresh. No overrides near expiry. Nothing to do.');
          "
