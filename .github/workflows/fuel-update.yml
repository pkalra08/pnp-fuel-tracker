# .github/workflows/fuel-update.yml
# Runs the fuel data job every Monday morning and commits the fresh rates.
# Free on a public GitHub repo. Once this is turned on, it runs itself.
# If a source ever fails, the job still commits (using last-known values for
# the failed carrier) and GitHub emails you that the run had errors.

name: Weekly Fuel Surcharge Update

on:
  schedule:
    # 11:00 UTC every Monday = 7:00am ET (6:00am during standard time).
    # Carriers post Monday morning, so this picks up the new week.
    - cron: '0 11 * * 1'
  workflow_dispatch: {}   # lets you run it by hand any time from the Actions tab

permissions:
  contents: write          # allows the job to commit the updated JSON

jobs:
  update-rates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install xlsx cheerio fast-xml-parser

      - name: Fetch fuel data and rebuild rates
        run: node fetch-and-build.js

      - name: Commit the updated rates
        run: |
          git config user.name "fuel-bot"
          git config user.email "fuel-bot@users.noreply.github.com"
          git add fuel-rates.json
          git diff --staged --quiet || git commit -m "Fuel rates updated $(date -u +%Y-%m-%d)"
          git push
